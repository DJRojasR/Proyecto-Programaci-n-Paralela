# mosquitto.conf
# Un solo broker, dos puertas de entrada:
#  - 1883/TCP  -> la usa el simulador en C (MPI + Pthreads, libmosquitto)
#  - 9001/WS   -> la usa el frontend web (navegador, mqtt.js sobre WebSocket)
# Mosquitto reenvía los mensajes entre ambos listeners automáticamente:
# lo que se publica por TCP llega a los suscriptores por WebSocket y viceversa.

listener 1883
protocol mqtt

listener 9001
protocol websockets

allow_anonymous true
